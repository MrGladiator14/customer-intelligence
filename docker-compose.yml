services:
  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile.fastapi
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - mlruns_data:/app/mlruns
      - ./data:/app/data
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_TRACKING_URI: sqlite:///app/mlflow.db
      MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - mlruns_data:/app/mlruns
      - mlflow_db:/app/mlflow.db
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    ports:
      - "8080:80"
    environment:
      FASTAPI_HOST: fastapi:8000
      MLFLOW_HOST: mlflow:5000
    depends_on:
      - fastapi
      - mlflow
    restart: unless-stopped

volumes:
  mlruns_data:
  mlflow_db:
